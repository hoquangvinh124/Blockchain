services:
  hardhat:
    build:
      context: ./contracts
      dockerfile: Dockerfile
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST http://localhost:8545 -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' > /dev/null"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 5s

  deployer:
    build:
      context: ./contracts
      dockerfile: Dockerfile
    command: pnpm exec hardhat run scripts/deploy.ts --network localhost
    environment:
      - FRONTEND_ENV_PATH=/frontend/.env
    volumes:
      - ./frontend:/frontend
    depends_on:
      hardhat:
        condition: service_healthy

  # Runs `pnpm build` AFTER deployer has written contract addresses to .env
  # Output goes into a named volume consumed by the nginx service
  frontend-build:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: sh -c "pnpm run build && cp -r dist/. /dist/"
    volumes:
      - ./frontend/.env:/app/.env:ro
      - frontend-dist:/dist
    depends_on:
      deployer:
        condition: service_completed_successfully

  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - frontend-dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend-build:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  frontend-dist:
